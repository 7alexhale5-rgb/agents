# audit-setup:lighthouse-ci v1 — regenerate via /audit-setup --ci-only --force
#
# Runs Lighthouse CI against Vercel preview deploys on every PR. Compares
# against the captured baseline at ops/lighthouse/baseline/*.report.json and
# posts a PR comment + Check Run with deltas. Assertions default to "warn"
# level (see .lighthouserc.json) — flip to "error" to enforce.
#
# Why LHCI (not a custom diff): LHCI's assertMatrix format is the 2026 norm,
# treosh/lighthouse-ci-action handles PR comment lifecycle, and
# temporary-public-storage gives us zero-setup artifact hosting. Off-ramp if
# trended history becomes a need: add `@lhci/cli upload --target=lhci-server`
# alongside and keep the rest of this workflow unchanged.
#
# Security: user-controlled inputs (inputs.url, environment_url from Vercel)
# are piped through env: blocks, never interpolated into run: steps. Mirrors
# the defense pattern in post-deploy-probe.yml.

name: Lighthouse CI

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to audit (defaults to latest preview)"
        required: false

jobs:
  lhci:
    # Only run on successful Vercel preview deploys. Manual dispatch bypasses.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Preview')
    runs-on: ubuntu-latest
    # 5 routes × 3 runs × ~60s/run on 2-core GH runners = ~15min baseline;
    # 20min gives headroom for setup + treosh upload + transient slowness.
    # If you reduce numberOfRuns in .lighthouserc.json, you can lower this.
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      checks: write
      deployments: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Resolve preview URL
        id: url
        env:
          DISPATCH_URL: ${{ inputs.url }}
          DEPLOY_URL: ${{ github.event.deployment_status.environment_url }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            URL="$DISPATCH_URL"
          else
            URL="$DEPLOY_URL"
          fi
          if [ -z "$URL" ]; then
            echo "::error::No URL provided"
            exit 2
          fi
          # Strict allowlist: audit-setup writes the allowed hosts at scaffold
          # time. Blocks arbitrary schemes + hosts piped into LHCI.
          case "$URL" in
            https://*.vercel.app*)
              ;;
            *)
              echo "::error::Rejecting audit URL outside allowlist: $URL"
              exit 2
              ;;
          esac
          # Strip trailing slash so LHCI can concat routes cleanly.
          URL="${URL%/}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Auditing: $URL"

      - name: Verify preview is publicly accessible
        # Vercel Deployment Protection (SSO/password) returns 401 + redirects
        # to vercel.com/login. Lighthouse follows the redirect and silently
        # scores the login page — assertMatrix patterns don't match the
        # redirected path, so all assertions are skipped and the run falsely
        # passes. Fail loudly here instead.
        #
        # Bypass options:
        #   1. Disable Vercel Deployment Protection for Preview deploys in
        #      the Vercel dashboard (Settings → Deployment Protection).
        #   2. Generate a "Protection Bypass for Automation" secret in Vercel
        #      and pass it via x-vercel-protection-bypass query param when
        #      building the LHCI URL list (or as an HTTP header).
        env:
          URL: ${{ steps.url.outputs.url }}
        run: |
          set -uo pipefail
          code=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
          if [ "$code" = "401" ] || [ "$code" = "403" ]; then
            echo "::error::Preview behind Vercel Deployment Protection (HTTP $code). LHCI cannot audit a protected deploy — assertions would silently pass."
            echo "::error::Fix: disable protection on Preview deploys, OR add a Protection Bypass token. See .github/workflows/lighthouse-ci.yml comment for details."
            exit 1
          fi
          if [ "$code" -ge 400 ]; then
            echo "::error::Preview returned HTTP $code (expected 2xx). Cannot audit."
            exit 1
          fi
          echo "Preview accessible: HTTP $code"

      - name: Build route list from baseline
        id: routes
        env:
          BASE_URL: ${{ steps.url.outputs.url }}
        run: |
          # Read each baseline JSON's requestedUrl, swap its origin for the
          # current preview BASE_URL, emit one URL per line. Slug-based
          # reconstruction would lose nested paths (e.g. /this-week/current
          # → this-week-current); reading requestedUrl is lossless.
          if ! ls ops/lighthouse/baseline/*.report.json > /dev/null 2>&1; then
            echo "::error::No baseline found at ops/lighthouse/baseline/*.report.json — run /audit-setup --lighthouse-only"
            exit 2
          fi
          URLS=$(node -e "
            const fs = require('fs');
            const path = require('path');
            const base = process.env.BASE_URL;
            const dir = 'ops/lighthouse/baseline';
            const out = [];
            for (const f of fs.readdirSync(dir).filter(x => x.endsWith('.report.json')).sort()) {
              const j = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'));
              const ru = j.requestedUrl || j.finalUrl;
              if (!ru) continue;
              try {
                const u = new URL(ru);
                out.push(base + u.pathname + u.search);
              } catch {}
            }
            console.log(out.join('\n'));
          ")
          {
            echo "urls<<EOF_URLS"
            echo "$URLS"
            echo "EOF_URLS"
          } >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$URLS" | grep -c .)" >> "$GITHUB_OUTPUT"
          echo "Routes to audit:"
          echo "$URLS"

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.routes.outputs.urls }}
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Post PR comment
        # Reads .lighthouseci/manifest.json (representative runs), diffs against
        # baseline per route, upserts a single PR comment keyed by a hidden
        # marker. Works without the LHCI GitHub App. Only runs on
        # deployment_status (workflow_dispatch has no associated PR).
        if: always() && github.event_name == 'deployment_status'
        uses: actions/github-script@v7
        env:
          # Silences Node 20 deprecation warning + future-proofs past
          # 2026-06-02 when GH Actions forces Node 24 by default.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          PREVIEW_URL: ${{ steps.url.outputs.url }}
          DEPLOYMENT_SHA: ${{ github.event.deployment.sha }}
          LHCI_JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const MARKER = '<!-- lhci-scaffold:comment -->';
            const previewUrl = process.env.PREVIEW_URL;
            const sha = process.env.DEPLOYMENT_SHA;
            const jobStatus = process.env.LHCI_JOB_STATUS;

            // Find PR(s) associated with this commit.
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const pr = prs.find(p => p.state === 'open') || prs[0];
            if (!pr) {
              core.info('No associated PR — skipping comment');
              return;
            }

            // Read LHCI manifest. Representative runs only (median of N).
            let manifest = [];
            try {
              const raw = fs.readFileSync('.lighthouseci/manifest.json', 'utf8');
              manifest = JSON.parse(raw).filter(m => m.isRepresentativeRun);
            } catch (e) {
              core.warning('No .lighthouseci/manifest.json — treosh step may have failed');
            }

            // Index baseline scores by pathname.
            const baselineByPath = {};
            const baselineDir = 'ops/lighthouse/baseline';
            if (fs.existsSync(baselineDir)) {
              for (const f of fs.readdirSync(baselineDir).filter(x => x.endsWith('.report.json'))) {
                try {
                  const j = JSON.parse(fs.readFileSync(path.join(baselineDir, f), 'utf8'));
                  const ru = j.requestedUrl || j.finalUrl;
                  if (!ru) continue;
                  const p = new URL(ru).pathname || '/';
                  const cats = j.categories || {};
                  baselineByPath[p] = {
                    performance: cats.performance && cats.performance.score,
                    accessibility: cats.accessibility && cats.accessibility.score,
                    'best-practices': cats['best-practices'] && cats['best-practices'].score,
                    seo: cats.seo && cats.seo.score,
                  };
                } catch {}
              }
            }

            const CATS = ['performance', 'accessibility', 'best-practices', 'seo'];
            const pct = v => v == null ? '—' : Math.round(v * 100);
            const delta = (cur, base) => {
              if (cur == null || base == null) return '';
              const d = Math.round((cur - base) * 100);
              if (d === 0) return '';
              const sign = d > 0 ? '+' : '';
              return ` (${sign}${d})`;
            };

            // Build per-route table + collect report links.
            const rows = [];
            const links = [];
            for (const entry of manifest) {
              let p = '/';
              try { p = new URL(entry.url).pathname || '/'; } catch {}
              const base = baselineByPath[p] || {};
              const summary = entry.summary || {};
              const cells = CATS.map(c => `${pct(summary[c])}${delta(summary[c], base[c])}`);
              rows.push(`| \`${p}\` | ${cells.join(' | ')} |`);
              // Parse temp-public-storage URL from htmlPath if present.
              if (entry.htmlPath) {
                const name = path.basename(entry.htmlPath);
                links.push(`- [\`${p}\`](${entry.url}) — ${name}`);
              }
            }

            const emoji = jobStatus === 'success' ? '✅' : jobStatus === 'failure' ? '❌' : '⚠️';
            const baselineNote = Object.keys(baselineByPath).length
              ? `Δ shown vs \`ops/lighthouse/baseline/\``
              : `No baseline found — showing absolute scores only`;

            const body = [
              MARKER,
              `## 🔦 Lighthouse CI — ${emoji} ${jobStatus}`,
              '',
              `**Preview:** \`${previewUrl}\``,
              `**Baseline:** ${baselineNote}`,
              '',
              '| Route | Perf | A11y | BP | SEO |',
              '|---|---|---|---|---|',
              ...(rows.length ? rows : ['| _(no data)_ | — | — | — | — |']),
              '',
              `_Scores 0-100, Δ in points. Assertions **warn-only** — flip to \`error\` in \`.lighthouserc.json\` to enforce._`,
              `_Full HTML reports linked in the \`Run Lighthouse CI\` step logs (temp-public-storage, ~7 day TTL)._`,
            ].join('\n');

            // Upsert by marker.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated LHCI comment #${existing.id} on PR #${pr.number}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
              core.info(`Created LHCI comment on PR #${pr.number}`);
            }

      - name: Summarize
        if: always()
        env:
          URL: ${{ steps.url.outputs.url }}
          COUNT: ${{ steps.routes.outputs.count }}
          STATUS: ${{ job.status }}
        run: |
          {
            echo "### Lighthouse CI — ${STATUS}"
            echo ""
            echo "Base URL: \`${URL}\`"
            echo "Routes audited: ${COUNT}"
            echo ""
            echo "Scores + deltas posted as a PR comment (upsert by hidden marker)."
            echo "Assertion level: warn-only (flip to \`error\` in \`.lighthouserc.json\` to enforce)."
          } >> "$GITHUB_STEP_SUMMARY"
