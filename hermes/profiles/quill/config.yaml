profile: quill

agent:
  max_iterations: 32
  iteration_budget_tokens: 200000

model:
  # PF Runtime and Hermes loaders read `default` and `provider`.
  default: nvidia/nemotron-3-nano-30b-a3b:free
  provider: openrouter
  routing:
    smoke_test: nvidia/nemotron-3-nano-30b-a3b:free
    draft_production: anthropic:claude-sonnet-4-6
    edge_case_judgment: anthropic:claude-opus-4-7

# One tool per drafting skill so each emission carries the correct
# skill_slug attribution (per Hermes-local proposal/receipt contract). All four
# drafting tools share the same write_scope and event.type — only the
# skill_slug differs. This preserves per-skill attribution in Hermes
# without modifying the patch #5 emitter (which reads skill_slug from
# the per-tool event block, no per-call override).
tools:
  builtin:
    - marketing_vault.read
    - draft_field_note.propose
    - draft_outreach.propose
    - draft_campaign_asset.propose
    - draft_revision.propose
  contracts:
    marketing_vault.read:
      authority: read_only
      scope: ~/Projects/marketing/
    draft_field_note.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/quill-drafts/
      event:
        type: quill.draft.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: draft-linkedin-field-note
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    draft_outreach.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/quill-drafts/
      event:
        type: quill.draft.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: draft-outreach-message
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    draft_campaign_asset.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/quill-drafts/
      event:
        type: quill.draft.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: draft-campaign-asset
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    draft_revision.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/quill-drafts/
      event:
        type: quill.draft.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: revise-from-critique
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed

memory:
  built_in:
    enabled: true
    fts5_enabled: true
  honcho:
    enabled: false

mcp_servers: {}
skills:
  install: []
  global: []
  shared:
    - generate-handoff

channels:
  # Quill has no external channels. Writes go to marketing/_inbox/quill-drafts/.
  # Slack / Telegram / email all disabled.
  slack:
    enabled: false

approval:
  mode: propose_only
  outbound_channels: []
  pii_redaction: true
  proposals:
    enabled: true
    execute: false
    write_target: ~/Projects/marketing/_inbox/quill-drafts/

guardrails:
  spend_cap_per_day_usd: 5
  alert_threshold_pct: 80
  honor_marketing_vault_kill_list: true
  honor_tool_adoption_triggers: true
  do_not_scale_without_named_workflow: true
  redact_raw_vault_text_from_receipts: true
  forbid_external_sends: true
  enforce_content_rule_links: true
  enforce_one_cta_per_draft: true

logging:
  trajectory_jsonl: true
  langfuse_project: hermes-quill
