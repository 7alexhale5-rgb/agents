profile: morning-logs

agent:
  max_iterations: 16
  iteration_budget_tokens: 120000

model:
  default: nvidia/nemotron-3-nano-30b-a3b:free
  provider: openrouter
  routing:
    smoke_test: nvidia/nemotron-3-nano-30b-a3b:free
    daily_brief: openrouter:anthropic/claude-sonnet-4.6

tools:
  builtin:
    - hermes_dashboard.read
    - repo_status.read
    - morning_logs.report.propose
  contracts:
    hermes_dashboard.read:
      authority: read_only
      scope: http://127.0.0.1:9119
    repo_status.read:
      authority: read_only
      scope: ~/Projects/
    morning_logs.report.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/agents/_inbox/morning-logs/
      event:
        type: morning_logs.report.proposed
        status: pending
        surface: cli
        cwd_project: agents
        skill_slug: daily-brief
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed

memory:
  built_in:
    enabled: true
    fts5_enabled: true
  honcho:
    enabled: false

mcp_servers: {}

skills:
  install: []
  global: []
  shared:
    - generate-handoff

channels:
  slack:
    enabled: false

approval:
  mode: propose_only
  outbound_channels: []
  pii_redaction: true
  proposals:
    enabled: true
    execute: false
    write_target: ~/Projects/agents/_inbox/morning-logs/

guardrails:
  spend_cap_per_day_usd: 0
  alert_threshold_pct: 80
  forbid_external_sends: true
  forbid_process_control: true
  forbid_token_edits: true
  forbid_profile_mutation: true
  forbid_approval_execution: true
  redact_raw_logs_from_events: true
  keep_pfos_evidence_only: true

logging:
  trajectory_jsonl: true
  langfuse_project: hermes-morning-logs
