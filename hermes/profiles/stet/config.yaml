profile: stet

agent:
  max_iterations: 32
  iteration_budget_tokens: 200000

model:
  default: nvidia/nemotron-3-nano-30b-a3b:free
  provider: openrouter
  routing:
    smoke_test: nvidia/nemotron-3-nano-30b-a3b:free
    critique_production: anthropic:claude-sonnet-4-6
    high_stakes_critique: anthropic:claude-opus-4-7

# One tool per critique skill so each emission carries the correct
# skill_slug attribution per Hermes ↔ PFOS event-contract ADR.
tools:
  builtin:
    - marketing_vault.read
    - draft_inbox.read
    - critique_draft.propose
    - critique_campaign.propose
    - critique_positioning.propose
    - pressure_test.propose
  contracts:
    marketing_vault.read:
      authority: read_only
      scope: ~/Projects/marketing/
    draft_inbox.read:
      authority: read_only
      scope: ~/Projects/marketing/_inbox/quill-drafts/
    critique_draft.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/stet-critiques/
      event:
        type: stet.critique.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: critique-draft
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    critique_campaign.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/stet-critiques/
      event:
        type: stet.critique.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: critique-campaign-brief
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    critique_positioning.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/stet-critiques/
      event:
        type: stet.critique.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: critique-positioning
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    pressure_test.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/stet-critiques/
      event:
        type: stet.critique.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: pressure-test-campaign
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed

memory:
  built_in:
    enabled: true
    fts5_enabled: true
  honcho:
    enabled: false

mcp_servers: {}
skills:
  install: []
  global: []
  shared:
    - generate-handoff

channels:
  # Stet has no external channels. Writes go to marketing/_inbox/stet-critiques/.
  slack:
    enabled: false

approval:
  mode: propose_only
  outbound_channels: []
  pii_redaction: true
  proposals:
    enabled: true
    execute: false
    write_target: ~/Projects/marketing/_inbox/stet-critiques/

guardrails:
  spend_cap_per_day_usd: 5
  alert_threshold_pct: 80
  honor_marketing_vault_kill_list: true
  honor_tool_adoption_triggers: true
  do_not_scale_without_named_workflow: true
  redact_raw_vault_text_from_pfos_events: true
  forbid_external_sends: true
  forbid_artifact_modification: true
  forbid_rewrite_generation: true
  require_source_for_every_finding: true
  require_verdict: true

logging:
  trajectory_jsonl: true
  langfuse_project: hermes-stet
