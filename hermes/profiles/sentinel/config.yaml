profile: sentinel

agent:
  max_iterations: 32
  iteration_budget_tokens: 200000

model:
  # PF Runtime and Hermes loaders read `default` and `provider`.
  default: nvidia/nemotron-3-nano-30b-a3b:free
  provider: openrouter
  routing:
    smoke_test: nvidia/nemotron-3-nano-30b-a3b:free
    draft_production: anthropic:claude-sonnet-4-6
    edge_case_judgment: anthropic:claude-opus-4-7

# One tool per execution skill so each emission carries the correct
# skill_slug attribution (per Hermes-local proposal/receipt contract). All five
# propose tools share the same write_scope and event.type — only the
# skill_slug differs. This preserves per-skill attribution in Hermes
# without modifying the patch #5 emitter (which reads skill_slug from
# the per-tool event block, no per-call override).
tools:
  builtin:
    - site_crawl.read
    - aeo_technical_audit.propose
    - generate_metadata_schema_pack.propose
    - aeo_question_cluster_brief.propose
    - competitor_citation_teardown.propose
    - opportunity_score.propose
  contracts:
    site_crawl.read:
      authority: read_only
      scope: https://prettyflyforai.com
    aeo_technical_audit.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/sentinel-drafts/
      event:
        type: sentinel.draft.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: aeo-technical-audit
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    generate_metadata_schema_pack.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/sentinel-drafts/
      event:
        type: sentinel.draft.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: generate-metadata-schema-pack
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    aeo_question_cluster_brief.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/sentinel-drafts/
      event:
        type: sentinel.draft.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: aeo-question-cluster-brief
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    competitor_citation_teardown.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/sentinel-drafts/
      event:
        type: sentinel.draft.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: competitor-citation-teardown
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    opportunity_score.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/marketing/_inbox/sentinel-drafts/
      event:
        type: sentinel.draft.proposed
        status: pending
        surface: cli
        cwd_project: marketing
        skill_slug: opportunity-score
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed

memory:
  built_in:
    enabled: true
    fts5_enabled: true
  honcho:
    enabled: false

mcp_servers: {}
skills:
  install: []
  global: []
  shared:
    - marketing-seo-specialist
    - marketing-ai-citation-strategist
    - marketing-agentic-search-optimizer
    - generate-handoff

channels:
  # Sentinel has no external channels. Writes go to marketing/_inbox/sentinel-drafts/.
  # Slack / Telegram / email all disabled.
  slack:
    enabled: false

approval:
  mode: propose_only
  outbound_channels: []
  pii_redaction: true
  proposals:
    enabled: true
    execute: false
    write_target: ~/Projects/marketing/_inbox/sentinel-drafts/

guardrails:
  spend_cap_per_day_usd: 5
  alert_threshold_pct: 80
  forbid_external_sends: true
  forbid_live_site_writes: true
  enforce_verify_then_deploy: true
  source_grounded_required: true
  honor_marketing_vault_kill_list: true

logging:
  trajectory_jsonl: true
  langfuse_project: hermes-sentinel
