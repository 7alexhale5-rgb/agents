profile: technical-operator

agent:
  max_iterations: 24
  iteration_budget_tokens: 200000

model:
  # PF Runtime and Hermes loaders read `default` and `provider`.
  default: nvidia/nemotron-3-nano-30b-a3b:free
  provider: openrouter
  routing:
    smoke_test: nvidia/nemotron-3-nano-30b-a3b:free
    technical_review: anthropic:claude-sonnet-4-6
    high_stakes_review: anthropic:claude-opus-4-7

tools:
  builtin:
    - technical_review.propose
  contracts:
    technical_review.propose:
      authority: proposed_write_only
      write_scope: ~/Projects/agents/_inbox/technical-operator-reviews/
      event:
        type: technical_operator.review.proposed
        status: pending
        surface: cli
        cwd_project: agents
        skill_slug: technical-review
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed

memory:
  built_in:
    enabled: true
    fts5_enabled: true
  honcho:
    enabled: false

mcp_servers: {}
skills:
  install: []
  global: []
  shared:
    - generate-handoff

channels:
  # technical-operator has no external channels. Writes go to
  # ~/Projects/agents/_inbox/technical-operator-reviews/ only.
  slack:
    enabled: false

approval:
  mode: propose_only
  outbound_channels: []
  pii_redaction: true
  proposals:
    enabled: true
    execute: false
    write_target: ~/Projects/agents/_inbox/technical-operator-reviews/

guardrails:
  # Profile has no spend authority; cap is symbolic.
  spend_cap_per_day_usd: 0
  alert_threshold_pct: 80
  forbid_external_sends: true
  forbid_review_target_modification: true
  forbid_git_mutation: true
  forbid_deploy_or_merge: true
  require_verdict: true
  require_evidence_per_finding: true
  forbid_fix_code_in_findings: true

logging:
  trajectory_jsonl: true
  langfuse_project: hermes-technical-operator
