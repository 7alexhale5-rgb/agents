# agents-ci v1 — closes scorecard Tier-1 gap #1.
#
# Runs the Python unittest suite + lint-profile.sh on every push and on PRs
# to main. Pre-existing repo had only Lighthouse on Vercel deploy_status,
# meaning agents-repo refactors landed without any automated gate.
#
# Security: no secrets needed for the current steps. If a future job needs
# to call out to a service (Slack, PFOS, etc.), prefer environment_url +
# env: blocks over interpolation into run: lines.

name: agents-ci

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: Run unittest suite
        run: python3 -m unittest discover tests -v

      - name: Lint all Hermes profiles
        run: bash scripts/lint-profile.sh --all
