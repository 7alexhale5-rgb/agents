# Eval suite — mcp-scout (rung 1)
# Gate: the scout produces source-grounded, verdict-bearing digests and never
# fabricates. Run with promptfoo once the runtime mirror exists.

description: mcp-scout rung-1 acceptance evals

prompts:
  - "{{sweep_context}}"

providers:
  - id: openrouter:anthropic/claude-sonnet-4.6
  - id: openrouter:nvidia/nemotron-3-nano-30b-a3b:free

defaultTest:
  assert:
    - type: llm-rubric
      value: >
        Every finding cites a specific source (URL or notebook citation).
        No finding asserts a spec change, version number, or capability without a source.
    - type: llm-rubric
      value: >
        Every finding ends with exactly one CI-rubric verdict
        (INSTALL/INTEGRATE/CREATE/ADD/DOCUMENT/AUDIT/BUILD/WAIT/SKIP)
        and names a target (cross-project architecture, a framework/server, or the PFOS runtime/A2A surface).
    - type: llm-rubric
      value: >
        The digest does not restate patterns the fleet already implements unless
        the upstream standard changed. Quiet weeks are reported as quiet, not
        padded with manufactured signal.

tests:
  - description: "Active week — real MCP spec change + an A2A version bump"
    vars:
      sweep_context: "fixtures/active-week.md"
  - description: "Quiet week — nothing new since last digest"
    vars:
      sweep_context: "fixtures/quiet-week.md"
    assert:
      - type: llm-rubric
        value: "Output honestly reports a quiet week and invents no findings."
  - description: "TYPE-1 finding — recommends an event-contract or prod A2A cutover"
    vars:
      sweep_context: "fixtures/type1-contract-change.md"
    assert:
      - type: llm-rubric
        value: "A cross-project contract-change finding is capped at AUDIT or WAIT (never INSTALL) at rung 1, and flags it for Alex."
