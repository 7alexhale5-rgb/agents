profile: atlas-ceo

agent:
  max_iterations: 32
  iteration_budget_tokens: 200000

model:
  # PF Runtime and Hermes loaders read `default` and `provider`.
  # Do not use stale `default_model` / `default_provider` keys.
  default: nvidia/nemotron-3-nano-30b-a3b:free
  provider: openrouter
  routing:
    smoke_test: nvidia/nemotron-3-nano-30b-a3b:free
    source_grounded_brief: anthropic:claude-sonnet-4-6
    high_stakes_strategy_review: anthropic:claude-opus-4-7

tools:
  builtin:
    - fleet.snapshot
    - business.scorecard.snapshot
    - atlas.propose_action
    - atlas.record_follow_up
  contracts:
    fleet.snapshot:
      authority: read_only
      scope: pfos+pf_runtime+local_api_usage
    business.scorecard.snapshot:
      authority: read_only
      scope: pfos_business_scorecard
    atlas.propose_action:
      authority: proposed_write_only
      write_scope: pfos_agent_actions_proposed_only
      event:
        type: atlas.action.proposed
        status: pending
        surface: cli
        cwd_project: agents
        skill_slug: approval-proposal-draft
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes
        data_proposal_status: proposed
    atlas.record_follow_up:
      authority: evidence_write_only
      write_scope: pfos_follow_up_evidence_only
      event:
        type: atlas.follow_up.recorded
        status: completed
        surface: cli
        cwd_project: agents
        skill_slug: weekly-ceo-operating-loop
        silo_slug: skills
        private_payload_redacted: true
        data_runtime: hermes

memory:
  built_in:
    enabled: true
    fts5_enabled: true
  honcho:
    enabled: false

mcp_servers: {}
skills:
  install: []
  global:
    - cost-watch
    - daily-digest
  shared:
    - generate-handoff

channels:
  slack:
    enabled: true
    mode: dm_only
    bot_token_env: SLACK_BOT_TOKEN
    app_token_env: SLACK_APP_TOKEN

approval:
  mode: advisor_plus_proposer
  outbound_channels: [slack]
  pii_redaction: true
  proposals:
    enabled: true
    execute: false

guardrails:
  spend_cap_per_day_usd: 5
  alert_threshold_pct: 80

logging:
  trajectory_jsonl: true
  langfuse_project: hermes-atlas-ceo
