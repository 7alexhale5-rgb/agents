# PF Runtime — matches scripts/pf-qa.sh (ruff, mypy, pytest+cov, bandit, pip-audit).
name: pf-runtime
on:
  push:
    paths:
      - "pf-runtime/**"
      - "scripts/pf-qa.sh"
      - "scripts/pf-cutover-preflight.sh"
      - "scripts/lib/ragas_score.py"
      - ".github/workflows/pf-runtime-ci.yml"
  pull_request:
    paths:
      - "pf-runtime/**"
      - "scripts/pf-qa.sh"
      - "scripts/pf-cutover-preflight.sh"
      - "scripts/lib/ragas_score.py"
      - ".github/workflows/pf-runtime-ci.yml"

jobs:
  qa:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: pf-runtime
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra dev --extra runtime --extra channels
      - name: Ruff
        run: uv run ruff check pf_runtime tests
      - name: Mypy
        run: uv run mypy pf_runtime
      - name: Pytest with coverage
        run: uv run pytest tests/ -q
      - name: Bandit
        run: uv run bandit -c pyproject.toml -r pf_runtime -q
      - name: pip-audit
        run: uv run pip-audit
