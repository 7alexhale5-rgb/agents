description: email-triage golden dataset regression — runs nightly, pass-rate floor 0.85

prompts:
  - file://prompts/categorize.txt

providers:
  - id: openrouter:nvidia/nemotron-nano-9b-v2
  - id: mistral:mistral-medium-latest
  - id: anthropic:claude-sonnet-4-6

tests:
  - file://golden.jsonl

# Pass criteria — keep tight, drift is the enemy
defaultTest:
  options:
    transform: file://transform.js
  assert:
    - type: javascript
      value: |
        // Category must match exactly (one of: respond / deferred / unsubscribe / delete)
        return output.category === context.vars.expected_category;
    - type: javascript
      value: |
        // Urgency must match within ±1 on the 5-point scale
        return Math.abs(output.urgency - context.vars.expected_urgency) <= 1;

outputPath: ./reports/{date}.json

# When this fails 3 nights in a row, VanClief drafts a fix PR.
# When it fails 7 nights, profile auto-pages on-call.
