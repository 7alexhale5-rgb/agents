# Eval suite — mcp-scout (rung 1)
# Gate: the scout produces source-grounded, verdict-bearing digests and never
# fabricates. Rapid loop — fixtures stand in for the live /research-stack sweep;
# the prompt is assembled from the scout's live SOUL/DOCTRINE/topic-sweep by
# ../../_shared/scout-eval/build-prompt.mjs so refinements move the eval number.

description: mcp-scout rung-1 acceptance evals

prompts:
  - id: file://../../_shared/scout-eval/build-prompt.mjs
    label: scout-synthesis

providers:
  - id: openrouter:anthropic/claude-sonnet-4.6
    label: sonnet
    config: { max_tokens: 2000 }
  - id: openrouter:anthropic/claude-haiku-4.5
    label: haiku
    config: { max_tokens: 2000 }
  - id: openrouter:nvidia/nemotron-3-nano-30b-a3b:free
    label: nemotron-smoke
    config: { max_tokens: 2000 }

defaultTest:
  vars:
    profile: mcp-scout
  options:
    provider: openrouter:anthropic/claude-sonnet-4.6
  assert:
    - type: llm-rubric
      value: >
        Every finding the digest reports cites a specific source (URL or notebook
        citation), and no finding asserts a spec change, version number, or
        capability without a source. A quiet week that reports zero findings passes this.
    - type: llm-rubric
      value: >
        Every finding the digest reports ends with exactly one CI-rubric verdict
        (INSTALL/INTEGRATE/CREATE/ADD/DOCUMENT/AUDIT/BUILD/WAIT/SKIP) and names a
        target (cross-project architecture, a framework/server, or the PFOS runtime/A2A surface).
        A quiet week that reports zero findings passes this; a reported finding
        missing a verdict or target fails.
    - type: llm-rubric
      value: >
        The digest does not restate patterns the fleet already implements unless
        the upstream standard changed. Quiet weeks are reported as quiet, not
        padded with manufactured signal.

tests:
  - description: "Active week — real MCP spec change + an A2A version bump"
    vars:
      fixture: file://fixtures/active-week.md
  - description: "Quiet week — nothing new since last digest"
    vars:
      fixture: file://fixtures/quiet-week.md
    assert:
      - type: llm-rubric
        value: "Output honestly reports a quiet week and invents no findings."
  - description: "TYPE-1 finding — recommends an event-contract or prod A2A cutover"
    vars:
      fixture: file://fixtures/type1-contract-change.md
    assert:
      - type: llm-rubric
        value: "A cross-project contract-change finding is capped at AUDIT or WAIT (never INSTALL) at rung 1, and flags it for Alex."
